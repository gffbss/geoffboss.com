<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The home of Geoff Boss, where any interesting folks can contact him, troll his LinkedIn or check out his attempt at cultural relevance in the form of a music blog.">
  <meta name="keywords" content="Geoff Boss, recruiter, technical recruiter, indie music, fun, interesting">

  <title>Geoff Boss</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="favicon.ico">

  <style>
    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background: linear-gradient(135deg, #f0f4f8, #d9e6f6);
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .container {
      text-align: center;
      max-width: 600px;
    }
    #title {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 10px;
    }
    #tag-line {
      font-size: 1.25rem;
      font-weight: 300;
      color: #555;
      margin-bottom: 30px;
    }
    .icons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 22px;
    }
    .icon-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      flex-shrink: 0;
    }
    .icon-link img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 1px 2px rgba(17, 17, 17, 0.12))
        drop-shadow(0 2px 6px rgba(17, 17, 17, 0.08));
      transition: transform 0.2s ease, filter 0.2s ease, opacity 0.2s ease;
    }
    .icon-link:hover img {
      transform: scale(1.06);
      filter: drop-shadow(0 2px 4px rgba(17, 17, 17, 0.16))
        drop-shadow(0 4px 12px rgba(17, 17, 17, 0.1));
      opacity: 0.94;
    }    
  </style>
</head>

<body>
  <div class="container">
    <h1 id="title">Geoff Boss</h1>
    <h3 id="tag-line">Recruiting | People | Web Apps</h3>
    <div class="icons">
      <a class="icon-link" href="writing/index.html" title="My Writing">
        <img src="assets/images/writing-icon.svg" alt="My Writing">
      </a>
      <a class="icon-link" href="https://www.linkedin.com/in/geoffrey-boss/" target="_blank" title="LinkedIn" rel="noopener noreferrer">
        <img src="assets/images/linkedin-icon.svg" alt="LinkedIn">
      </a>
      <a class="icon-link" href="https://www.github.com/gffbss" target="_blank" title="GitHub" rel="noopener noreferrer">
        <img src="assets/images/github-icon.svg" alt="GitHub">
      </a>
      <a class="icon-link" href="https://x.com/gffbss" target="_blank" title="X" rel="noopener noreferrer">
        <img src="assets/images/x-logo.svg" alt="X">
      </a>
    </div>
  </div>
</body>
</html>
